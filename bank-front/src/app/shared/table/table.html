@if (loading()) {
  <div class="table-spinner">
    <mat-spinner diameter="48" />
  </div>
} @else {
  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort>
      @for (col of columns(); track col.key) {
        <ng-container [matColumnDef]="col.key">
          <th mat-header-cell *matHeaderCellDef [mat-sort-header]="col.sortable ? col.key : ''" [disabled]="!col.sortable">
            {{ col.label }}
          </th>
          <td mat-cell *matCellDef="let row">
            @if (col.type === 'toggle') {
              <mat-slide-toggle
                [checked]="$any(row)[col.key]"
                (change)="toggleChange.emit({ row: row, value: $event.checked })"
              />
            } @else {
              {{ $any(row)[col.key] }}
            }
          </td>
        </ng-container>
      }

      @if (actionsTemplate()) {
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let row">
            <ng-container *ngTemplateOutlet="actionsTemplate()!; context: { $implicit: row }" />
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row no-data-row" *matNoDataRow>
        <td [attr.colspan]="displayedColumns.length" class="no-data-cell">
          No hay datos para mostrar.
        </td>
      </tr>
    </table>
  </div>

  <mat-paginator
    [pageSize]="pageSize()"
    [pageSizeOptions]="pageSizeOptions()"
    showFirstLastButtons
  />
}
